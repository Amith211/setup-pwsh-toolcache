name: setup PowerShell action (toolcache)
description: downloads and unpacks PowerShell (pwsh) for gh actions

inputs:
  token:
    description: github personal access token
    default: ${{ github.token }}

  tag:
    description: release tag (e.g., '7.5.0' or 'latest')
    default: latest

runs:
  using: composite
  steps:

    # ------------------------------------------------------------
    # 1. RESOLVE CACHE + INSTALL PATH (RUNS FIRST)
    # ------------------------------------------------------------
    - name: resolve install path
      id: resolve
      shell: bash
      run: |
        set -e

        version="${{ inputs.tag }}"

        if [ "${{ runner.os }}" = "Linux" ]; then
          os="linux"
        elif [ "${{ runner.os }}" = "macOS" ]; then
          os="osx"
        elif [ "${{ runner.os }}" = "Windows" ]; then
          os="windows"
        fi

        arch="$(uname -m)"

        tool_root="${RUNNER_TOOL_CACHE:-/opt/hostedtoolcache}"
        install_dir="$tool_root/pwsh/$version/$os-$arch"

        echo "install_dir=$install_dir" >> "$GITHUB_OUTPUT"

        if [ -f "$install_dir/pwsh" ] || [ -f "$install_dir/pwsh.exe" ]; then
          echo "cached=true" >> "$GITHUB_OUTPUT"
        else
          echo "cached=false" >> "$GITHUB_OUTPUT"
        fi


    # ------------------------------------------------------------
    # 2. WINDOWS DOWNLOAD (ONLY IF NOT CACHED)
    # ------------------------------------------------------------
    - name: download PowerShell
      id: win32_download_pwsh
      if: runner.os == 'Windows' && steps.resolve.outputs.cached != 'true'
      shell: powershell
      run: |
        $arch = $env:PROCESSOR_ARCHITECTURE.ToLower()

        if ($arch -eq "amd64") {
          $arch = "x64"
        } elseif ($arch -eq "arm64") {
          $arch = "arm64"
        } elseif ($arch -eq "x86") {
          $arch = "x86"
        } else {
          throw "unsupported architecture called `$arch`"
        }

        $headers = @{
          "Authorization" = "Bearer $env:token"
          "Content-Type"  = "application/json"
        }

        $uri = if ($env:tag -eq "latest") {
          "https://api.github.com/repos/PowerShell/PowerShell/releases/latest"
        } else {
          "https://api.github.com/repos/PowerShell/PowerShell/releases/tags/$env:tag"
        }

        $response = Invoke-RestMethod -Uri $uri -Headers $headers
        $tag = $response.tag_name
        $version = $tag -replace '^v', ''

        $name_version_os_arch_ext = "PowerShell-${version}-win-${arch}.zip"

        $obj = $response.assets | Where-Object { $_.name -eq $name_version_os_arch_ext }

        if (-not $obj) {
          throw "asset not found"
        }

        Invoke-WebRequest -Uri $obj.browser_download_url -OutFile $obj.name -Headers $headers

        "archive=$($obj.name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append


    # ------------------------------------------------------------
    # 3. WINDOWS UNPACK (ONLY IF NOT CACHED)
    # ------------------------------------------------------------
    - name: unpack PowerShell (Windows)
      if: runner.os == 'Windows' && steps.resolve.outputs.cached != 'true'
      shell: powershell
      run: |
        $installDir = "${{ steps.resolve.outputs.install_dir }}"

        Expand-Archive `
          -Path "${{ steps.win32_download_pwsh.outputs.archive }}" `
          -DestinationPath $installDir


    # ------------------------------------------------------------
    # 4. WINDOWS PATH
    # ------------------------------------------------------------
    - name: add PowerShell to path (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        "${{ steps.resolve.outputs.install_dir }}" |
          Out-File -FilePath $env:GITHUB_PATH -Append


    # ------------------------------------------------------------
    # 5. UNIX DOWNLOAD (ONLY IF NOT CACHED)
    # ------------------------------------------------------------
    - name: download PowerShell (unix)
      id: unix_like_download_pwsh
      if: runner.os == 'Linux' || runner.os == 'macOS'
        && steps.resolve.outputs.cached != 'true'
      shell: bash
      run: |
        set -e

        if [ "${{ runner.os }}" = "Linux" ]; then
          os="linux"
        else
          os="osx"
        fi

        arch=$(uname -m)

        case "$arch" in
          x86_64) arch="x64" ;;
          aarch64) arch="arm64" ;;
          armv7l) arch="arm32" ;;
          *) echo "unsupported arch"; exit 1 ;;
        esac

        headers=(-H "Authorization: Bearer $token" -H "Content-Type: application/json")

        if [ "$tag" = "latest" ]; then
          uri="https://api.github.com/repos/PowerShell/PowerShell/releases/latest"
        else
          uri="https://api.github.com/repos/PowerShell/PowerShell/releases/tags/$tag"
        fi

        response=$(curl -s "${headers[@]}" "$uri")

        _tag=$(echo "$response" | jq -r '.tag_name')
        version="${_tag#v}"

        name="powershell-${version}-${os}-${arch}.tar.gz"

        url=$(echo "$response" | jq -r ".assets[] | select(.name == \"$name\") | .browser_download_url")

        curl -L "${headers[@]}" "$url" -o "$name"

        echo "archive=$name" >> "$GITHUB_OUTPUT"
        echo "version=$version" >> "$GITHUB_OUTPUT"


    # ------------------------------------------------------------
    # 6. UNIX UNPACK (ONLY IF NOT CACHED)
    # ------------------------------------------------------------
    - name: unpack PowerShell (unix)
      if: runner.os == 'Linux' || runner.os == 'macOS'
        && steps.resolve.outputs.cached != 'true'
      shell: bash
      run: |
        set -e

        install_dir="${{ steps.resolve.outputs.install_dir }}"

        mkdir -p "$install_dir"

        tar -xf "${{ steps.unix_like_download_pwsh.outputs.archive }}" \
          -C "$install_dir"

        chmod +x "$install_dir/pwsh"


    # ------------------------------------------------------------
    # 7. PATH (UNIX)
    # ------------------------------------------------------------
    - name: add PowerShell to path (unix)
      if: runner.os == 'Linux' || runner.os == 'macOS'
      shell: bash
      run: |
        echo "${{ steps.resolve.outputs.install_dir }}" >> $GITHUB_PATH
